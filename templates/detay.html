<!DOCTYPE html>
<html>
<head><title>{{ analiz.sembol }} - TürkFin AI</title>
<style>
    body { font-family: Arial; margin: 30px; background: #f8fafc; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 700px; margin: 0 auto; }
</style>
</head>
<body>
    <div class="card">
        <h1>{{ analiz.sembol }} Detaylı Analiz</h1>
        <h2>{{ analiz.fiyat }} TL</h2>
        <p><strong>Değişim:</strong> {{ analiz.degisim }}%</p>
        <p><strong>RSI:</strong> {{ analiz.rsi }}</p>
        <p><strong>Yorum:</strong> {{ analiz.yorum }}</p>
        <hr>
        <p><strong>🎯 Tavsiye: {{ analiz.tavsiye }}</strong></p>
        <a href="/">← Ana Sayfaya Dön</a>
    </div>
</body>
</html>
